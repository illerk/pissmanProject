<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Правила - New Life</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        .container {
            display: flex;
        }

        aside {
            width: 220px;
            background: #020617;
            padding: 20px;
            border-right: 1px solid #1e293b;
            min-height: 100vh;
        }

        aside h3 {
            margin-top: 0;
            font-size: 16px;
            color: #94a3b8;
        }

        aside a {
            display: block;
            color: #e2e8f0;
            text-decoration: none;
            margin: 8px 0;
        }

        aside a:hover {
            color: #38bdf8;
        }

        main {
            flex: 1;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        main h2 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        main p {
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: justify;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .grid > a {
            text-decoration: none;
            color: inherit;
        }

        .grid > a:hover .card {
            border-color: #38bdf8;
            transform: translateY(-2px);
        }

        .card {
            background: #020617;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            transition: 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .card h3,
        .card p {
            pointer-events: none;
        }

        .card h3 {
            margin-top: 0;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>
    <header>
    <h1>New Life</h1>
</header>

<div class="container">
    <aside>
        <h3>Навигация</h3>
        <a href="main.html">Главная</a>
        <a href="character-creation.html">Создание персонажа</a>
        <a href="factions.html">Справочник фракций</a>
        <a href="lore.html">Лор</a>
        <a href="rules.html">Правила</a>
    </aside>

    <main>
        <h2>Правила системы New Life</h2>

        <div class="grid">
            <a href="hp-system.html" style="text-decoration: none;">
                <div class="card">
                    <h3>Система урона и здоровья</h3>
                    <p>Правила, касающиеся системы урона.</p>
                </div>
            </a>
        </div>
    </main>
</div>

<footer>
    © 2026 New Life | Синтомясо для ебли
</footer>

</body>
</html>
