<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login ManticoreNET</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-header">
    <div class="logo">ManticoreNET</div>
    <div class="search">Your network • Home</div>
  </div>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="nav-item" id="nav-profile">Profile</div>
      <div class="nav-item" id="nav-contacts">Contacts</div>
      <div class="nav-item" id="nav-feed">Feed</div>
      <div class="nav-item" id="nav-messages">Messages</div>
      <div class="nav-item">Settings</div>
    </aside>

    <main class="content">
      <div class="card login-center">
        <h2 style="margin:0 0 12px 0">Welcome back</h2>
        <p style="color:#aaa; margin:0 0 12px 0">Sign in to continue to your network</p>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password" style="margin-top:8px">
        <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-start">
          <button id="loginBtn">Login</button>
          <button id="registerBtn">Register</button>
        </div>
        <p id="status" style="margin-top:12px;color:#aaa"></p>
      </div>
    </main>
  </div>

  <script type="module" src="script.js"></script>

  <script>
    const navContacts = document.getElementById('nav-contacts');
    if (navContacts) {
      navContacts.addEventListener('click', () => {
        if (!localStorage.getItem('currentUser')) return;
        window.location.href = 'profile.html#contacts';
      });
    }

    const navProfile = document.getElementById('nav-profile');
    if (navProfile) {
      navProfile.addEventListener('click', () => {
        if (!localStorage.getItem('currentUser')) return;
        window.location.href = 'profile.html';
      });
    }

    const navFeed = document.getElementById('nav-feed');
    if (navFeed) {
      navFeed.addEventListener('click', () => {
        if (!localStorage.getItem('currentUser')) return;
        window.location.href = 'feed.html';
      });
    }

    const navMessages = document.getElementById('nav-messages');
    if (navMessages) {
      navMessages.addEventListener('click', () => {
        if (!localStorage.getItem('currentUser')) return;
        window.location.href = 'messages.html';
      });
    }

    (async function showMenuUnread() {
      const user = localStorage.getItem('currentUser');
      if (!user) return;
      try {
        const res = await fetch("https://immersivethingsforsierra.ru/ManticoreNET/api/unread/" + encodeURIComponent(user));
        if (!res.ok) return;
        const data = await res.json();
        if (!data || !data.success) return;
        const total = data.total || 0;
        const navMessages = document.getElementById('nav-messages');
        if (total > 0 && navMessages) {
          let mb = navMessages.querySelector('.unread-badge');
          if (!mb) {
            mb = document.createElement('span');
            mb.className = 'unread-badge';
            mb.style.marginLeft = '8px';
            navMessages.appendChild(mb);
          }
          mb.textContent = total > 99 ? '99+' : String(total);
          mb.style.display = '';
        }
      } catch(e){}
    })();
  </script>
</body>
</html>
