<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D SVG Map</title>
<style>
    body {
        margin: 0;
        background: #0a0a0a;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        perspective: 1000px;
    }

    .map-container {
        width: 80vw;
        height: 80vh;
        transform-style: preserve-3d;
        transition: transform 0.1s ease-out;
    }

    .map-container svg {
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
    }
</style>
</head>
<body>

<div class="map-container" id="map">
    <object data="mapmapsvg.svg" type="image/svg+xml"></object>
</div>

<script>
const map = document.getElementById("map");

document.addEventListener("mousemove", (e) => {
    const { innerWidth, innerHeight } = window;

    // Нормализация координат (-1 до 1)
    const x = (e.clientX / innerWidth - 0.5) * 2;
    const y = (e.clientY / innerHeight - 0.5) * 2;

    // Угол наклона
    const rotateY = x * 15;  // горизонталь
    const rotateX = -y * 15; // вертикаль

    map.style.transform = `
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
        scale(1.02)
    `;
});
</script>

</body>
</html>
